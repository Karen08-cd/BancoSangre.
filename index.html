<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Banco de Sangre/LaCardio</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:,">
</head>

<body>

<header class="navbar">
  <div class="nav-left">
    <img src="assets/logo-lacardioblanco.png" class="logo">
  </div>
</header>

<section class="main">

  <!-- IZQUIERDA -->
  <div class="left">
    <div class="banner">
      BANC<img src="assets/ico-heart.svg" style="width:50px">
<div class="bann">DE SANGRE</div>
    </div>
    <img src="assets/osito.png" class="osito">
  </div>

  <!-- DERECHA -->
  <div class="right">
    <div class="menu-servicios">

      <!-- FORMULARIO UNIFICADO -->
    
        <summary> 📩 <strong> Enviar (SMS + Email)</strong> </summary>

        <form id="formEnvioUnificado">
          <textarea
            id="smsMessage"
            placeholder="Mensaje SMS..."
            required
          ></textarea>

          <input
            type="file"
            id="excelUnificado"
            accept=".xlsx,.xls"
            required
          >

          <button type="submit">
            Previsualizar Datos
          </button>
        </form>
     

    </div>
  </div>
</section>

<!-- MODAL PREVIEW UNIFICADO -->
<div id="modalPreview" class="modal-overlay" style="display:none;">
  <div class="modal-card">

    <div class="modal-header">
      <h3>VERIFICA LOS DATOS ANTES DE ENVIAR </h3>
      <button class="modal-close" id="cerrarPreview"> <strong> X</strong></button>
    </div>

    <div class="modal-body">
      <table class="modal-table">
        <thead>
          <tr>
            <th>Número</th>
            <th>SMS</th>
            <th>Correo</th>
            <th>Email</th>
          </tr>
        </thead>
        <tbody id="previewTable"></tbody>
      </table>
    </div>

    <div class="modal-footer">

      <!-- CORAZÓN -->
      <div class="heart-loader" id="heartLoader">
        <svg viewBox="0 0 512 512" class="heart-svg">
          <defs>
            <clipPath id="heartClip">
              <path d="M256 464 C256 464 32 288 32 160 C32 96 80 48 144 48 C192 48 224 80 256 112 C288 80 320 48 368 48 C432 48 480 96 480 160 C480 288 256 464 256 464"/>
            </clipPath>
          </defs>

          <path d="M256 464 C256 464 32 288 32 160 C32 96 80 48 144 48 C192 48 224 80 256 112 C288 80 320 48 368 48 C432 48 480 96 480 160 C480 288 256 464 256 464" fill="#e0e0e0"/>

          <rect
            id="heartFill"
            x="0"
            y="512"
            width="512"
            height="512"
            fill="#E40046"
            clip-path="url(#heartClip)"
          />
        </svg>

        <div class="heart-percent" id="heartPercent">0%</div>
      </div>

     <button id="btnConfirmar" class="btn-confirmar">
  Confirmar envío
</button> 
    </div>

  </div>
</div>

<script src="./app.js"></script>
</body>
</html>
